services:
  n8n:
    image: n8nio/n8n
    container_name: placemate-n8n

    ports:
      - "5678:5678"

    env_file:
      - .env

    environment:
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_ENABLE_ENV_ACCESS_IN_NODE=true
      

    volumes:
      - C:\Users\kalpesh\.n8n:/home/node/.n8n

    restart: always